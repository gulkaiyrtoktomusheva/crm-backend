services:
  postgres:
    image: postgres:16-alpine
    container_name: ort-crm-db
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ort_crm}
      POSTGRES_USER: ${POSTGRES_USER:-ortcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ortcrm} -d ${POSTGRES_DB:-ort_crm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    container_name: ort-crm-back
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/ort_crm}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-ortcrm}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_me_strong_password}
      JWT_SECRET: ${JWT_SECRET:-replace_with_openssl_rand_base64_64}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8086}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8087}:${SERVER_PORT:-8080}"

  frontend:
    build:
      context: ../../../ort-crm-frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: ort-crm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8086:80"

volumes:
  postgres-data:
